<div class="bg-linear-to-br from-emerald-700 via-emerald-600 to-emerald-500 text-white shadow-2xl">
  <div class="container mx-auto px-4 py-10 sm:py-14">
    <nav class="flex items-center gap-2 text-sm text-white/70 mb-6 flex-wrap">
      <a class="hover:text-white transition-colors" routerLink="/home">Home</a
      ><span class="text-white/40">/</span><span class="text-white font-medium">Categories</span>
    </nav>
    <div class="flex items-center gap-5">
      <div
        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30"
      >
        <i class="fas fa-layer-group text-3xl"></i>
      </div>
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All Categories</h1>
        <p class="text-white/80 mt-1">Browse our wide range of product categories</p>
      </div>
    </div>
  </div>
</div>
<div class="container mx-auto px-4 py-10">
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
    @for (category of categoryList(); track category._id) {
      <a
        [routerLink]="['/categoryDetails' , category.slug , category._id]"
        class="group bg-white rounded-2xl border border-gray-100 p-4 sm:p-6 shadow-sm hover:shadow-xl hover:border-primary-200 transition-all duration-300 hover:-translate-y-1"
 
        ><div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-4">
          <img
            [alt]="category.name"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
            [src]="category.image"
          />
        </div>
        <h3
          class="font-bold text-gray-900 text-center group-hover:text-emerald-600  transition-colors"
        >
          {{category.name}}
        </h3>
        <div class="flex justify-center mt-2 text-emerald-600 opacity-0 group-hover:opacity-100 transition-opacity">
          <span class="text-xs text-primary-600 flex items-center gap-1"
            >View Subcategories<svg
              data-prefix="fas"
              data-icon="arrow-right"
              class="svg-inline--fa fa-arrow-right text-2xs"
              role="img"
              viewBox="0 0 512 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"
              ></path></svg
          ></span></div
      ></a>
    }
  </div>
</div>
